<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Caixa Forte</title>
     <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
    <link rel="stylesheet" href="./assets/css/caixaforte.css">
    <link rel="stylesheet" href="./assets/css/all.css">
</head>
<body class="inria-sans-700">
    <div class="dashboard">
        <section class="card" id="entrada">
            <div class="titulo">Assistente Pessoal de Controle Financeiro</div>
            <form>
                <div class="form">
                    <input type="number" name="index" hidden>
                    <div class="flex">
                        <label for="inputdescricao">Descrição</label>
                        <input class="c10 form-input is-focused" type="text" name="descricao" id="inputdescricao" required>
                    </div>
                    <div class="flex">
                        <label for="inputtipo">Tipo</label>
                        <select name="tipo" id="inputtipo" class="c5 form-input" required>
                            <option hidden selected disabled></option>
                            <option value="despesa">Débito</option>
                            <option value="credito">Crédito</option>
                        </select>
                        <label for="inputvalor">Valor</label>
                        <input type="number" step="0.01" name="valor" id="inputvalor" class="c5 form-input" required>
                    </div>
                    <div class="flex">
                        <label for="inputdata">Recebimento</label>
                        <input type="date" name="data" id="inputdata" class="form-input" required>
                        <label for="inputformadepagamento">Forma de Pagamento</label>
                        <select name="formadepagamento" id="inputformadepagamento" class="c5 form-input" required>
                            <option hidden disabled selected></option>
                            <option value="pix">PIX</option>
                            <option value="credito">Crédito em Conta</option>
                            <option value="debito">Débito em Conta</option>
                            <option value="dinheiro">Em Espécie</option>
                            <option value="transferencia">Transferência</option>
                        </select> 
                    </div>
                    <div class="flex">
                        <label for="textareaobservacao">Observação</label>
                        <textarea class="c10 form-textarea" name="textareaobservacao" id="textareaobservacao" cols="30" rows="5" ></textarea>
                    </div>
                    <div class="center">
                        <button class="button is-success" id="btnSalvar" type="submit">Salvar</button>
                        <button class="button is-danger" id="btnCancelar" type="reset">Cancelar</button>
                    </div>
                </div>
            </form>
        </section>
        <section class="card" id="resumo">
            <div class="flex">
                <label for="inputdespesas">Despesas</label>
                <input type="text" step="0.01" name="despesas" id="inputdespesas" class="tad c3 form-input" disabled>
                <label for="inputreceitas">Receitas</label>
                <input type="text" step="0.01" name="receitas" id="inputreceitas" class="tad c3 form-input" disabled>
                <label for="inputSaldo">Saldo</label>
                <input type="text" step="0.01" name="saldo" id="inputSaldo" class="tad c3 form-input" disabled>
            </div>
        </section>
        <section class="card" id="detalhamento">
            <div class="grid-2">
                <div class="coluna">
                    <div>
                        Resumo de Receitas
                    </div>
                    <div class="resumo" id="credito" name="resumoReceitas" disabled>
                        <ul>
                          
                        </ul>
                    </div>
                </div>
                <div class="coluna">
                    <div>
                        Resumo de Despesas
                    </div>
                    <div class="resumo" id="despesa" name="resumoDespesas" disabled>
                        <ul>

                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
<script src="./assets/js/caixaforte.js"></script>
<script src="./assets/js/crud.js"></script>
</html>
